<!DOCTYPE html>
<html>

<head>

  <meta http-equiv="content-type" content="text/html; charset=UTF-8">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>
        {% block title %}Product Catalog {% endblock title %}
    </title>
    <style>
    /* === RESET / MINIMAL BASE === */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      background: #f8fafc;
      color: #0f172a;
      line-height: 1.5;
      padding: 1rem;
    }

    a {
      color: #0f172a;
      text-decoration: none;
    }

    button,
    .button,
    input,
    select {
      font: inherit;
      background: white;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      padding: 0.5rem 0.75rem;
    }

    .button {
      display: inline-block;
      background: #f1f5f9;
      text-align: center;
      cursor: default;
      /* no JS, acts as link wrapper */
      border: 1px solid #94a3b8;
    }

    .button-primary {
      background: #1e293b;
      color: white;
      border-color: #0f172a;
    }

    .button-small {
      padding: 0.25rem 0.6rem;
      font-size: 0.875rem;
    }

    /* === LAYOUT: MOBILE-FIRST GRID === */
    .catalog-layout {
      display: flex;
      flex-direction: column;
      gap: 2rem;
      max-width: 1280px;
      margin: 0 auto;
    }

    /* Filter sidebar – stacked on mobile, inline on larger */
    .filters-panel {
      background: #ffffff;
      padding: 1.5rem 1rem;
      border-radius: 16px;
      box-shadow: 0 4px 6px -4px #cbd5e1;
      border: 1px solid #e2e8f0;
    }

    .filter-form {
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
    }

    .filter-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem 1rem;
      align-items: flex-end;
    }

    .filter-group {
      display: flex;
      flex-direction: column;
      min-width: 140px;
      flex: 1 1 auto;
    }

    .filter-group label {
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      color: #475569;
      margin-bottom: 0.2rem;
    }

    .price-range {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      flex-wrap: wrap;
    }

    .price-range input {
      width: 110px;
    }

    .filter-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin-top: 0.5rem;
    }

    /* product grid */
    .product-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1.5rem;
    }

    /* product card */
    .product-card {
      background: white;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.02), 0 2px 4px #e2e8f0;
      border: 1px solid #edf2f7;
      display: flex;
      flex-direction: column;
      transition: box-shadow 0.1s;
    }

    .product-image {
      background: #f1f5f9;
      aspect-ratio: 1 / 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #64748b;
      font-size: 0.9rem;
      border-bottom: 1px solid #e2e8f0;
    }

    .product-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      background: #f1f5f9;
    }

    /* fallback when image fails or missing */
    .product-image img[src=""],
    .product-image img:not([src]) {
      opacity: 0;
    }

    .product-image:has(img[src=""])::after,
    .product-image:has(img:not([src]))::after {
      content: "🖼️ " attr(alt);
      display: flex;
      align-items: center;
      justify-content: center;
      background: #e9eef3;
      color: #334155;
      font-size: 1rem;
      height: 100%;
      width: 100%;
    }

    .product-details {
      padding: 1rem;
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    .product-category {
      font-size: 0.75rem;
      text-transform: uppercase;
      color: #64748b;
      letter-spacing: 0.5px;
      margin-bottom: 0.25rem;
    }

    .product-name {
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: 0.3rem;
      line-height: 1.3;
    }

    .product-description {
      color: #334155;
      font-size: 0.9rem;
      margin-bottom: 1rem;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .product-price {
      font-weight: 700;
      font-size: 1.3rem;
      color: #0f172a;
      margin-bottom: 1rem;
    }

    .product-actions {
      display: flex;
      gap: 0.6rem;
      margin-top: auto;
      flex-wrap: wrap;
    }

    .product-actions .button {
      flex: 1 0 auto;
      text-align: center;
      background: #ffffff;
      border: 1px solid #1e293b;
      font-weight: 500;
    }

    .product-actions .button-primary {
      background: #1e293b;
      color: white;
      border: 1px solid #1e293b;
    }

    /* Pagination */
    .pagination {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.5rem;
      margin: 2rem 0 1rem;
    }

    .pagination a,
    .pagination span {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 2.5rem;
      height: 2.5rem;
      padding: 0 0.5rem;
      border-radius: 8px;
      background: white;
      border: 1px solid #cbd5e1;
    }

    .pagination .current {
      background: #1e293b;
      color: white;
      border-color: #0f172a;
    }

    .pagination .ellipsis {
      border: none;
      background: transparent;
    }

    /* empty state */
    .empty-state {
      background: white;
      border-radius: 24px;
      padding: 3rem 1.5rem;
      text-align: center;
      border: 1px dashed #94a3b8;
      color: #334155;
      grid-column: 1 / -1;
    }

    /* clear filters */
    .clear-filters {
      background: #fee2e2;
      border-color: #f87171;
      color: #b91c1c;
      white-space: nowrap;
    }

    /* responsive breakpoints */
    @media (min-width: 600px) {
      .product-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .filter-form {
        flex-direction: row;
        flex-wrap: wrap;
        align-items: flex-end;
      }

      .filter-actions {
        margin-left: auto;
        margin-top: 0;
      }
    }

    @media (min-width: 992px) {
      .catalog-layout {
        flex-direction: row;
        align-items: flex-start;
      }

      .filters-panel {
        flex: 0 0 280px;
        position: sticky;
        top: 1rem;
      }

      .product-grid {
        flex: 1;
        grid-template-columns: repeat(3, 1fr);
      }
    }

    @media (min-width: 1200px) {
      .product-grid {
        grid-template-columns: repeat(4, 1fr);
      }
    }

    /* utility */
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
    }
  </style>
</head>
<header>
    <h1>
        My Product Store
    </h1>
</header>
{% block content %}{% endblock content %}

</html>
